<script>
    // Find all script elements
    const scripts = document.querySelectorAll('script[src]');
    // Look for a script with "_" in its src
    const targetScript = Array.from(scripts).find(script => script.src.includes('_'));
    // If found, set the title of the page
    if (targetScript) {
      const srcValue = targetScript.src.split('/').pop(); // Extract the file name
      document.title = srcValue;
    }
</script>

<!-- manifest must load before the version-switch script below -->
<script src="manifest.js"></script>
<script>
    (function () {
      const fileList = MAN_FILE_LIST;
      let currentIndex = -1;

      function tagOriginalScript() {
        // Give the initial static MAN_*.js tag the same id our dynamic
        // swapper uses, so it gets replaced (not left behind) on first click.
        const scripts = document.getElementsByTagName('script');
        const original = Array.from(scripts).find(s => s.src.includes('MAN_') && !s.id);
        if (original) original.id = 'dynamicManScript';
      }

      function getCurrentScriptFilename() {
        const scripts = document.getElementsByTagName('script');
        const target = Array.from(scripts).find(s => s.src.includes('MAN_'));
        return target ? target.src.split('/').pop() : null;
      }

      function rebuildTable() {
        const table = document.getElementById('regtable');
        const tbody = table.tBodies[0];
        tbody.innerHTML = '';
        noMoreSameName_airline();
      }

      function loadScriptFile(filename) {
        return new Promise((resolve, reject) => {
          const old = document.getElementById('dynamicManScript');
          if (old) old.remove();

          const script = document.createElement('script');
          script.id = 'dynamicManScript';
          script.src = filename;
          script.onload = () => {
            rebuildTable(); // this also calls updateThWithTime() internally now correctly
            resolve();
          };
          script.onerror = reject;
          document.body.appendChild(script);
        });
      }

      function updateLabel() {
        const label = document.getElementById('versionLabel');
        if (currentIndex >= 0 && currentIndex < fileList.length) {
          label.textContent = `${fileList[currentIndex]} (${currentIndex + 1}/${fileList.length})`;
        }
        document.getElementById('prevBtn').disabled = currentIndex <= 0;
        document.getElementById('nextBtn').disabled = currentIndex >= fileList.length - 1;
      }

      function init() {
        tagOriginalScript(); // <-- key fix, must run before anything else

        const currentFile = getCurrentScriptFilename();
        currentIndex = fileList.indexOf(currentFile);
        if (currentIndex === -1) currentIndex = fileList.length - 1;

        document.getElementById('prevBtn').addEventListener('click', async () => {
          if (currentIndex > 0) {
            currentIndex--;
            await loadScriptFile(fileList[currentIndex]);
            updateLabel();
          }
        });

        document.getElementById('nextBtn').addEventListener('click', async () => {
          if (currentIndex < fileList.length - 1) {
            currentIndex++;
            await loadScriptFile(fileList[currentIndex]);
            updateLabel();
          }
        });

        updateLabel();
      }

      document.addEventListener('DOMContentLoaded', init);
    })();
</script>
